<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Fair Copilot</title>
     <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> AI Career Fair Copilot</h1>
    <p>
        An AI assistant that helps students prepare for career fairs
        by analyzing job descriptions and generating personalized guidance.
    </p>
    <h2>Student Profile</h2>
    <form id="careerForm">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="major">Major</label>
        <input type="text" id="major" name="major" required>

        <label for="gradYear">Graduation Year</label>
        <input type="number" id="gradYear" name="gradYear" required>

        <label for="skills">Skills</label>
        <textarea id="skills" name="skills" required></textarea>

        <label for="jobDescription">Job Description</label>
        <textarea id="jobDescription" name="jobDescription" required></textarea>

        <button type="submit">Analyze My Match</button>
    </form>
</body>
</html>
